  <circle cx="50" cy="50" r="46" stroke="#D4AF37" stroke-width="3"/>
  <circle cx="50" cy="50" r="40" stroke="#D4AF37" stroke-width="1" stroke-dasharray="2 4"/>
  <!-- Diamond markers -->
  <polygon points="50,10 52,15 50,20 48,15" fill="#D4AF37"/>
  <polygon points="50,90 52,85 50,80 48,85" fill="#D4AF37"/>
  <polygon points="90,50 85,48 80,50 85,52" fill="#D4AF37"/>
  <polygon points="10,50 15,48 20,50 15,52" fill="#D4AF37"/>
  <!-- Hands -->
  <path d="M 49 50 L 49 22 L 50 18 L 51 22 L 51 50 Z" fill="#D4AF37"/>
  <path d="M 48.5 50 L 48.5 35 L 50 32 L 51.5 35 L 51.5 50 Z" fill="#D4AF37" transform="rotate(45 50 50)"/>
